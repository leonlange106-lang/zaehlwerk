<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e5c66" />
  <!-- Zum Startbildschirm hinzufügen -> Vollbild ohne Browser-Leiste. Bewusst
       ohne Web-App-Manifest/Service-Worker: unter dem HA-Ingress liegt die App
       hinter einem dynamischen Basispfad, ein festes start_url würde fehlleiten.
       Diese Meta-Angaben genügen für eine app-artige Darstellung und bergen
       kein solches Risiko. -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zählwerk" />
  <title>Zählwerk</title>
  <script>
    // Theme sofort setzen (vor CSS-Anwendung) -> kein Hell-Aufblitzen im Dark-Mode
    (function () {
      var el = document.documentElement;
      var m = localStorage.getItem("zw_theme") || "auto";
      var dark = m === "dark" || (m === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      el.setAttribute("data-theme", dark ? "dark" : "light");
      el.setAttribute("data-palette", localStorage.getItem("zw_palette") || "teal");
      var c = localStorage.getItem("zw_contrast") || "standard";
      if (c === "standard" && window.matchMedia("(prefers-contrast: more)").matches) c = "high";
      el.setAttribute("data-contrast", c);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!--
    Externe Libs via CDN (nur Funktion, keine Design-Abhängigkeit).
    Für 100% Offline-Betrieb: beide Dateien lokal nach /frontend/vendor/ legen
    und die src-Pfade unten anpassen. Details im README (Abschnitt Offline).
  -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.js"></script>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
