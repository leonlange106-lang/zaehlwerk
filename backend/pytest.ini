[pytest]
# Tests laufen vom Add-on-Wurzelverzeichnis (zaehlwerk/). `pythonpath = .` legt
# genau dieses Verzeichnis auf den Importpfad, damit `import app` sowohl mit
# `pytest` als auch mit `python -m pytest` funktioniert – lokal wie in der CI.
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = -q
