name: Tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest
        run: pytest

  webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Typecheck & build (Vite + tsc)
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile the HA integration
        run: python -m compileall -q custom_components/zaehlwerk
      - name: Validate JSON (manifest, hacs, translations)
        run: |
          python - <<'PY'
          import json, glob, sys
          for f in ["hacs.json", "custom_components/zaehlwerk/manifest.json",
                    *glob.glob("custom_components/zaehlwerk/translations/*.json"),
                    "custom_components/zaehlwerk/strings.json"]:
              json.load(open(f))
              print("ok", f)
          PY
